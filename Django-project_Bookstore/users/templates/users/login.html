{% extends 'shop_app/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="card-title text-center mb-4">Вход в магазин</h2>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100">Войти</button>
                    </form>
                    <p class="mt-3 text-center">Ещё не зарегистрированы? <a href="{% url 'users:register' %}">Регистрация</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
