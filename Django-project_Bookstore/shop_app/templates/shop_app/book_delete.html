{% extends 'shop_app/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger shadow">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">⚠️ Підтвердження видалення</h4>
                </div>
                <div class="card-body p-4 text-center">
                    <p class="fs-5">Ви впевнені, що хочете назавжди видалити книгу <strong>"{{ book.title }}"</strong>?</p>
                    <p class="text-muted small">Цю дію не можна буде скасувати.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3 mt-4">
                            <a href="{% url 'shop_app:book_detail' pk=book.pk %}" class="btn btn-light border">Скасувати</a>
                            <button type="submit" class="btn btn-danger px-4">Так, видалити</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
