<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Книжкова крамниця{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'shop_app:book_list' %}">📚 Книгарня</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">

              <li class="nav-item">
                <a class="nav-link" href="{% url 'shop_app:store' %}">Головна</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="{% url 'shop_app:book_list' %}">Каталог</a>
              </li>

              {% if user.is_staff %}
              <li class="nav-item">
                <a class="nav-link text-warning" href="{% url 'shop_app:book_create' %}">➕ Додати книгу</a>
              </li>
              {% endif %}

            </ul>

          <span class="navbar-text">
            {% if user.is_authenticated %}
              Ви увійшли як: <strong>{{ user.username }}</strong>
            {% else %}
              Гість
            {% endif %}
          </span>
        </div>

      </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
