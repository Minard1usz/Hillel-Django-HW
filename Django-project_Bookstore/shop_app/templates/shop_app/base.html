<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Книжкова крамниця{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'shop_app:book_list' %}">📚 Книгарня</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
              <li class="nav-item">
                <a class="nav-link" href="{% url 'shop_app:store' %}">Головна</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'shop_app:book_list' %}">Каталог</a>
              </li>
              {% if user.is_staff %}
              <li class="nav-item">
                <a class="nav-link text-warning" href="{% url 'shop_app:book_create' %}">➕ Додати книгу</a>
              </li>
              {% endif %}
            </ul>

            <ul class="navbar-nav ms-auto align-items-center">
              {% if user.is_authenticated %}
                <li class="nav-item">
                  <span class="navbar-text text-light me-3">
                    Ви увійшли як: <strong>{{ user.username }}</strong>
                  </span>
                </li>
                <li class="nav-item">
                  <form method="post" action="{% url 'users:logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger btn-sm">Вийти</button>
                  </form>
                </li>
              {% else %}
                <li class="nav-item">
                  <a class="btn btn-outline-light btn-sm me-2" href="{% url 'users:login' %}">Вхід</a>
                </li>
                <li class="nav-item">
                  <a class="btn btn-warning btn-sm" href="{% url 'users:register' %}">Реєстрація</a>
                </li>
              {% endif %}
            </ul>
        </div>

      </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
