{% extends 'shop_app/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="card-title mb-0">✨ Додати нову книгу до каталогу</h3>
                </div>
                <div class="card-body p-4">
                    
                    <form method="post" enctype="multipart/form-data" class="needs-validation">
                        {% csrf_token %}
                        
                        <div class="mb-3 django-form-fields">
                            {{ form.as_p }}
                        </div>
                        
                        <hr class="my-4">
                        
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{% url 'shop_app:book_list' %}" class="btn btn-light border">Скасувати</a>
                            <button type="submit" class="btn btn-success px-4">💾 Зберегти книгу</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .django-form-fields p {
        margin-bottom: 15px;
    }
    .django-form-fields input[type="text"], 
    .django-form-fields input[type="number"], 
    .django-form-fields textarea, 
    .django-form-fields select {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        background-clip: padding-box;
        border: 1px solid #ced4da;
        border-radius: 0.375rem;
        transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
    }
    .django-form-fields input[type="file"] {
        display: block;
        width: 100%;
        font-size: 1rem;
        color: #212529;
    }
</style>
{% endblock %}
